apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-minio-internal
  namespace: aegis-data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
