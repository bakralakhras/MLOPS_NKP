apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-ml-to-minio
  namespace: aegis-data
  labels:
    app.kubernetes.io/part-of: aegis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aegis-ml
      ports:
        - protocol: TCP
          port: 9000
