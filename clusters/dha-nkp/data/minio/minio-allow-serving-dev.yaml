apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-serving-dev-to-minio
  namespace: aegis-data
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "7"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio

  policyTypes:
    - Ingress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aegis-serving-dev
          podSelector:
            matchLabels:
              serving.kserve.io/inferenceservice: aegis-fraud-baseline

      ports:
        - protocol: TCP
          port: 9000
