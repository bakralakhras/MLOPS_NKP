apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: aegis-data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: aegis-data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: aegis-data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
