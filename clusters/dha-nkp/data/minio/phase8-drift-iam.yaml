apiVersion: batch/v1
kind: Job
metadata:
  name: phase8-drift-iam
  namespace: aegis-data
  labels:
    app.kubernetes.io/name: phase8-drift-iam
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phase8-drift-iam
        app.kubernetes.io/part-of: aegis
        aegis.io/phase: "8"
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: configure-drift-policy
          image: minio/mc:RELEASE.2025-05-21T01-59-54Z
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: aegis-minio-root-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-minio-root-credentials
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
          args:
            - |
              set -eu

              mkdir -p /tmp/.mc

              mc --config-dir /tmp/.mc alias set \
                aegis \
                http://minio.aegis-data.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" \
                "$MINIO_ROOT_PASSWORD"

              cat >/tmp/phase8-drift-read.json <<'POLICY'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "s3:GetBucketLocation",
                      "s3:ListBucket"
                    ],
                    "Resource": [
                      "arn:aws:s3:::aegis-gold"
                    ],
                    "Condition": {
                      "StringLike": {
                        "s3:prefix": [
                          "phase5/*"
                        ]
                      }
                    }
                  },
                  {
                    "Effect": "Allow",
                    "Action": [
                      "s3:GetObject"
                    ],
                    "Resource": [
                      "arn:aws:s3:::aegis-gold/phase5/*"
                    ]
                  }
                ]
              }
              POLICY

              mc --config-dir /tmp/.mc admin policy info \
                aegis aegis-phase8-drift-read >/dev/null 2>&1 ||
              mc --config-dir /tmp/.mc admin policy create \
                aegis aegis-phase8-drift-read /tmp/phase8-drift-read.json

              mc --config-dir /tmp/.mc admin policy attach \
                aegis aegis-phase8-drift-read \
                --user aegis-feast

              mc --config-dir /tmp/.mc admin user info \
                aegis aegis-feast
