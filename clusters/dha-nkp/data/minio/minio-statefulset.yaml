apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: aegis-data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: aegis
spec:
  serviceName: minio-headless
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: aegis
    spec:
      serviceAccountName: aegis-data-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-05-24T17-08-30Z
        imagePullPolicy: IfNotPresent
        args:
        - server
        - http://minio-{0...3}.minio-headless.aegis-data.svc.cluster.local/data
        - --console-address
        - :9001
        envFrom:
        - secretRef:
            name: aegis-minio-root-credentials
        ports:
        - name: s3
          containerPort: 9000
        - name: console
          containerPort: 9001
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: '2'
            memory: 4Gi
        volumeMounts:
        - name: data
          mountPath: /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        env:
        - name: MINIO_PROMETHEUS_AUTH_TYPE
          value: public
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: aegis
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: nutanix-volume
      resources:
        requests:
          storage: 50Gi
