apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-metoro-to-minio-metrics
  namespace: aegis-data
  labels:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: metoro
          podSelector:
            matchLabels:
              app.kubernetes.io/component: service-monitor-scraper
      ports:
        - protocol: TCP
          port: 9000
