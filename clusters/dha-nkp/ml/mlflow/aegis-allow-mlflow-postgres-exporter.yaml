apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-mlflow-postgres-exporter
  namespace: aegis-ml
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mlflow-postgres-exporter
      ports:
        - protocol: TCP
          port: 5432
