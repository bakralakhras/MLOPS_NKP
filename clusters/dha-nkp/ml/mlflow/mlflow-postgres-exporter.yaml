apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres-exporter
  namespace: aegis-ml
  labels:
    app.kubernetes.io/name: mlflow-postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-postgres-exporter
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: aegis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_URI
              value: mlflow-postgres.aegis-ml.svc.cluster.local:5432/mlflow?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-credentials
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: PG_EXPORTER_COLLECTION_TIMEOUT
              value: 15s
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres-exporter
  namespace: aegis-ml
  labels:
    app.kubernetes.io/name: mlflow-postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
spec:
  selector:
    app.kubernetes.io/name: mlflow-postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mlflow-postgres
  namespace: aegis-ml
  labels:
    app.kubernetes.io/name: mlflow-postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
spec:
  namespaceSelector:
    matchNames:
      - aegis-ml
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-metoro-to-mlflow-postgres-metrics
  namespace: aegis-ml
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres-exporter
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: metoro
          podSelector:
            matchLabels:
              app.kubernetes.io/component: service-monitor-scraper
      ports:
        - protocol: TCP
          port: 9187
