apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
  namespace: aegis-ml
  labels:
    app.kubernetes.io/name: mlflow-postgres
    app.kubernetes.io/part-of: aegis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mlflow-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mlflow-postgres
  namespace: aegis-ml
  labels:
    app.kubernetes.io/name: mlflow-postgres
    app.kubernetes.io/part-of: aegis
spec:
  serviceName: mlflow-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-postgres
        app.kubernetes.io/part-of: aegis
    spec:
      serviceAccountName: aegis-ml-sa
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: mlflow-postgres-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: mlflow-postgres
          app.kubernetes.io/part-of: aegis
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nutanix-volume
        resources:
          requests:
            storage: 20Gi
