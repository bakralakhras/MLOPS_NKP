apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-postgres-exporter
  namespace: aegis-airflow
  labels:
    app.kubernetes.io/name: airflow-postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: '8'
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-postgres-exporter
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: aegis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres-exporter
        image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1
        imagePullPolicy: IfNotPresent
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: aegis-airflow-airflow-metadata
              key: connection
        - name: PG_EXPORTER_COLLECTION_TIMEOUT
          value: 15s
        ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: metrics
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres-exporter
  namespace: aegis-airflow
  labels:
    app.kubernetes.io/name: airflow-postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
spec:
  selector:
    app.kubernetes.io/name: airflow-postgres-exporter
  ports:
  - name: metrics
    port: 9187
    targetPort: metrics
    protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: airflow-postgres
  namespace: aegis-airflow
  labels:
    app.kubernetes.io/name: airflow-postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: '8'
spec:
  namespaceSelector:
    matchNames:
    - aegis-airflow
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-postgres-exporter
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    relabelings:
    - targetLabel: aegis_component
      replacement: airflow-postgres
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-allow-metoro-to-airflow-postgres-metrics
  namespace: aegis-airflow
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: '8'
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: airflow-postgres-exporter
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: metoro
      podSelector:
        matchLabels:
          app.kubernetes.io/component: service-monitor-scraper
    ports:
    - protocol: TCP
      port: 9187
