apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: aegis-airflow
spec:
  interval: 10m
  timeout: 30m
  targetNamespace: aegis-airflow
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: airflow
      version: 1.22.0
      sourceRef:
        kind: HelmRepository
        name: apache-airflow
        namespace: aegis-system
      interval: 10m
  values:
    fullnameOverride: airflow
    executor: KubernetesExecutor
    multiNamespaceMode: false
    defaultAirflowRepository: apache/airflow
    defaultAirflowTag: 3.2.2
    airflowVersion: 3.2.2
    redis:
      enabled: false
    postgresql:
      enabled: true
      primary:
        persistence:
          enabled: true
          storageClass: nutanix-volume
          size: 10Gi
    pgbouncer:
      enabled: false
    statsd:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
    flower:
      enabled: false
    logs:
      persistence:
        enabled: false
    triggerer:
      replicas: 1
      persistence:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    dags:
      persistence:
        enabled: false
      gitSync:
        enabled: false
    volumes:
    - name: airflow-validation-dags
      configMap:
        name: airflow-validation-dags
    - name: airflow-phase5-training-dag
      configMap:
        name: airflow-phase5-training-dag
    - name: airflow-phase6-feature-pipeline-dag
      configMap:
        name: airflow-phase6-feature-pipeline-dag
    - name: airflow-phase8-drift-monitor-dag
      configMap:
        name: airflow-phase8-drift-monitor-dag
    volumeMounts:
    - name: airflow-validation-dags
      mountPath: /opt/airflow/dags/aegis_phase_4_validation_dag.py
      subPath: aegis_phase_4_validation_dag.py
      readOnly: true
    - name: airflow-phase5-training-dag
      mountPath: /opt/airflow/dags/aegis_phase_5_training_dag.py
      subPath: aegis_phase_5_training_dag.py
      readOnly: true
    - name: airflow-phase6-feature-pipeline-dag
      mountPath: /opt/airflow/dags/aegis_phase_6_feature_pipeline_dag.py
      subPath: aegis_phase_6_feature_pipeline_dag.py
      readOnly: true
    - name: airflow-phase8-drift-monitor-dag
      mountPath: /opt/airflow/dags/aegis_phase_8_drift_monitor_dag.py
      subPath: aegis_phase_8_drift_monitor_dag.py
      readOnly: true
    env:
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: 'False'
    migrateDatabaseJob:
      enabled: true
      useHelmHooks: false
      ttlSecondsAfterFinished: 300
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    createUserJob:
      useHelmHooks: false
      ttlSecondsAfterFinished: 300
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    apiServer:
      replicas: 1
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    webserver:
      replicas: 1
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    scheduler:
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    dagProcessor:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    workers:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
