apiVersion: v1
kind: ResourceQuota
metadata:
  name: aegis-system-quota
  namespace: aegis-system
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aegis-data-quota
  namespace: aegis-data
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 64Gi
    limits.cpu: "32"
    limits.memory: 128Gi
    pods: "80"
    persistentvolumeclaims: "20"
    requests.storage: 500Gi
---
