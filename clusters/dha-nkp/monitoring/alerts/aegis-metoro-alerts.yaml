apiVersion: observability.metoro.io/v1alpha1
kind: MetoroAlert
metadata:
  name: aegis-predictor-unavailable
  namespace: aegis-serving-dev
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
    aegis.io/severity: critical
spec:
  displayName: Aegis Predictor Unavailable
  description: The fraud inference service is not exposing successful request metrics.
  aiInvestigateOnFire: true
  timeseries:
    expression:
      metoroQLTimeseries:
        query: 'max(up{service="aegis-fraud-baseline-metrics"})'
        bucketSize: 60
    evaluationRules:
      - name: Predictor unavailable
        type: static
        static:
          operators:
            - operator: lessThan
              threshold: 1
          persistenceSettings:
            datapointsInEvaluationWindow: 3
            datapointsToAlarm: 3
            missingDatapointBehavior: breaching
---
apiVersion: observability.metoro.io/v1alpha1
kind: MetoroAlert
metadata:
  name: aegis-inference-high-failure-rate
  namespace: aegis-serving-dev
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
    aegis.io/severity: warning
spec:
  displayName: Aegis Inference Failure Rate High
  description: More than five percent of model inference requests are failing.
  aiInvestigateOnFire: true
  timeseries:
    expression:
      metoroQLTimeseries:
        query: '100 * sum(rate(model_infer_request_failure_total{model="aegis-fraud-baseline"}[5m])) / clamp_min(sum(rate(model_infer_request_success_total{model="aegis-fraud-baseline"}[5m])) + sum(rate(model_infer_request_failure_total{model="aegis-fraud-baseline"}[5m])), 0.001)'
        bucketSize: 60
    evaluationRules:
      - name: Failure rate above five percent
        type: static
        static:
          operators:
            - operator: greaterThan
              threshold: 5
          persistenceSettings:
            datapointsInEvaluationWindow: 5
            datapointsToAlarm: 3
            missingDatapointBehavior: notBreaching
---
apiVersion: observability.metoro.io/v1alpha1
kind: MetoroAlert
metadata:
  name: aegis-inference-high-latency
  namespace: aegis-serving-dev
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
    aegis.io/severity: warning
spec:
  displayName: Aegis Inference P95 Latency High
  description: Inference p95 latency has exceeded 500 milliseconds.
  aiInvestigateOnFire: true
  timeseries:
    expression:
      metoroQLTimeseries:
        query: 'histogram_quantile(0.95, sum by (le) (rate(rest_server_request_duration_seconds_bucket{method="POST"}[5m])))'
        bucketSize: 60
    evaluationRules:
      - name: P95 latency above 500ms
        type: static
        static:
          operators:
            - operator: greaterThan
              threshold: 0.5
          persistenceSettings:
            datapointsInEvaluationWindow: 10
            datapointsToAlarm: 5
            missingDatapointBehavior: notBreaching
---
apiVersion: observability.metoro.io/v1alpha1
kind: MetoroAlert
metadata:
  name: aegis-airflow-scheduler-missing
  namespace: aegis-airflow
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
    aegis.io/severity: critical
spec:
  displayName: Aegis Airflow Scheduler Heartbeat Missing
  description: No Airflow scheduler heartbeat has been observed.
  aiInvestigateOnFire: true
  timeseries:
    expression:
      metoroQLTimeseries:
        query: 'sum(increase(airflow_scheduler_heartbeat[5m]))'
        bucketSize: 60
    evaluationRules:
      - name: Scheduler heartbeat absent
        type: static
        static:
          operators:
            - operator: lessThanOrEqual
              threshold: 0
          persistenceSettings:
            datapointsInEvaluationWindow: 5
            datapointsToAlarm: 3
            missingDatapointBehavior: breaching
---
