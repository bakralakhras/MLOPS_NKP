apiVersion: observability.metoro.io/v1alpha1
kind: MetoroAlert
metadata:
  name: aegis-pod-restarts
  namespace: aegis-monitoring
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
    aegis.io/severity: warning
spec:
  displayName: Aegis Repeated Pod Restarts
  description: Aegis containers have restarted repeatedly during the last fifteen minutes.
  aiInvestigateOnFire: true
  timeseries:
    expression:
      metoroQLTimeseries:
        query: 'sum(increase(kube_pod_container_status_restarts_total{namespace=~"aegis-.*"}[15m]))'
        bucketSize: 60
    evaluationRules:
      - name: Repeated container restarts
        type: static
        static:
          operators:
            - operator: greaterThan
              threshold: 3
          persistenceSettings:
            datapointsInEvaluationWindow: 5
            datapointsToAlarm: 2
            missingDatapointBehavior: notBreaching
