apiVersion: observability.metoro.io/v1alpha1
kind: MetoroAlert
metadata:
  name: aegis-minio-capacity-high
  namespace: aegis-data
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "8"
    aegis.io/severity: warning
spec:
  displayName: Aegis MinIO Capacity High
  description: More than eighty percent of usable MinIO capacity is consumed.
  aiInvestigateOnFire: true
  timeseries:
    expression:
      metoroQLTimeseries:
        query: '100 * (1 - max(minio_cluster_capacity_usable_free_bytes{aegis_component="minio"}) / clamp_min(max(minio_cluster_capacity_usable_total_bytes{aegis_component="minio"}), 1))'
        bucketSize: 300
    evaluationRules:
      - name: MinIO capacity above eighty percent
        type: static
        static:
          operators:
            - operator: greaterThan
              threshold: 80
          persistenceSettings:
            datapointsInEvaluationWindow: 3
            datapointsToAlarm: 3
            missingDatapointBehavior: notBreaching
---
