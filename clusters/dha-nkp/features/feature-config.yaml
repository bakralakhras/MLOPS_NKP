apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-feature-config
  namespace: aegis-features
  labels:
    app.kubernetes.io/name: aegis-feature-platform
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: '6'
data:
  AWS_DEFAULT_REGION: us-east-1
  AWS_REGION: us-east-1
  AWS_EC2_METADATA_DISABLED: 'true'
  S3_ENDPOINT_URL: http://minio.aegis-data.svc.cluster.local:9000
  AWS_ENDPOINT_URL: http://minio.aegis-data.svc.cluster.local:9000
  AWS_ENDPOINT_URL_S3: http://minio.aegis-data.svc.cluster.local:9000
  AWS_S3_ADDRESSING_STYLE: path
  AEGIS_SILVER_BUCKET: aegis-silver
  AEGIS_FEATURE_BUCKET: aegis-features
  AEGIS_SILVER_PREFIX: phase5/run_ts=
  AEGIS_FEATURE_PREFIX: phase6/offline
  FEAST_REGISTRY_URI: s3://aegis-features/phase6/registry/registry.pb
  FEAST_FEATURE_SERVICE: fraud_detection_v1
  PYTHONDONTWRITEBYTECODE: '1'
  HOME: /tmp
  XDG_CACHE_HOME: /tmp/.cache
  AEGIS_GOLD_BUCKET: aegis-gold
