apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegis-airflow-feature-pod-launcher
  namespace: aegis-features
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "6"
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - create
      - get
      - list
      - watch
      - patch
      - delete

  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get

  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
      - get

  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegis-airflow-feature-pod-launcher
  namespace: aegis-features
  labels:
    app.kubernetes.io/part-of: aegis
    aegis.io/phase: "6"
subjects:
  - kind: ServiceAccount
    name: airflow-scheduler
    namespace: aegis-airflow

  - kind: ServiceAccount
    name: airflow-worker
    namespace: aegis-airflow

  - kind: ServiceAccount
    name: airflow-triggerer
    namespace: aegis-airflow

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aegis-airflow-feature-pod-launcher
