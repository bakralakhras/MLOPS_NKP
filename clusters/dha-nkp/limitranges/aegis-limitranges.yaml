apiVersion: v1
kind: LimitRange
metadata:
  name: aegis-default-limits
  namespace: aegis-system
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    default:
      cpu: "1"
      memory: 1Gi
---
